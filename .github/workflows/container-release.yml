name: container-release

on:
  push:
    branches:
      - codex/deploy-stack
      - deploy
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  frontend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jamissue-frontend
          tags: |
            type=raw,value=deploy-latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  backend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jamissue-backend
          tags: |
            type=raw,value=deploy-latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-bundle:
    runs-on: ubuntu-latest
    needs:
      - frontend-image
      - backend-image
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-bundle
          path: |
            deploy/docker-compose.cloudflare.yml
            deploy/.env.cloudflare.example
            docs/deployment-cloudflare.md
