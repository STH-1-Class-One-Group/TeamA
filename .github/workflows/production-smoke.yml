name: production-smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_PAGES_PROJECT_NAME: daejeon-jamissue-pages
      PUBLIC_APP_BASE_URL: https://api.daejeon.jamissue.com
      PUBLIC_NAVER_MAP_CLIENT_ID: ${{ vars.PUBLIC_NAVER_MAP_CLIENT_ID || '' }}
      PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL || vars.APP_SUPABASE_URL || '' }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY || secrets.APP_SUPABASE_ANON_KEY || '' }}
      CF_PAGES_BRANCH: main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install -g wrangler@4.74.0
      - run: npm ci
      - name: Ensure Pages project exists and production branch is main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          project_uri="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${CLOUDFLARE_PAGES_PROJECT_NAME}"
          status_code="$(curl --silent --show-error --output /tmp/pages-project.json --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${project_uri}")"
          if [ "${status_code}" = "404" ]; then
            curl --fail --show-error --silent \
              --request POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT_NAME}\",\"production_branch\":\"main\"}"
          elif [ "${status_code}" = "200" ]; then
            curl --fail --show-error --silent \
              --request PATCH \
              "${project_uri}" \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data '{"production_branch":"main"}'
          else
            cat /tmp/pages-project.json
            exit 1
          fi
      - name: Build static frontend
        run: npm run build
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy infra/nginx/site --project-name "${CLOUDFLARE_PAGES_PROJECT_NAME}" --branch "${CF_PAGES_BRANCH}"

  deploy-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy/api-worker-shell
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g wrangler@4.74.0
      - name: Deploy production worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

  smoke:
    needs:
      - deploy-pages
      - deploy-worker
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE_URL: https://daejeon-jamissue-pages.pages.dev
      SMOKE_API_BASE_URL: https://daejeon-jamissue-api.yhh4433.workers.dev
      SMOKE_FORCE_API_BASE_URL: 1
      SMOKE_DEPLOY_WAIT_MS: 0
      SMOKE_RETRY_ATTEMPTS: 5
      SMOKE_RETRY_DELAY_MS: 15000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run public production smoke checks
        run: node scripts/run-public-smoke-checks.mjs

  protected-smoke:
    needs:
      - deploy-pages
      - deploy-worker
    runs-on: ubuntu-latest
    env:
      SMOKE_BASE_URL: https://daejeon-jamissue-pages.pages.dev
      SMOKE_API_BASE_URL: https://daejeon-jamissue-api.yhh4433.workers.dev
      SMOKE_FORCE_API_BASE_URL: 1
      SMOKE_DEPLOY_WAIT_MS: 0
      SMOKE_RETRY_ATTEMPTS: 5
      SMOKE_RETRY_DELAY_MS: 15000
      SMOKE_AUTH_BEARER_TOKEN: ${{ secrets.SMOKE_AUTH_BEARER_TOKEN || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run protected production smoke checks
        run: node scripts/run-protected-smoke-checks.mjs
