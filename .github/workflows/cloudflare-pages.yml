name: cloudflare-pages

on:
  push:
    branches:
      - codex/production-deploy
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g wrangler@4.74.0
      - run: npm ci
      - name: Ensure Pages production branch matches deploy branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl --fail --show-error --silent \
            --request PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/jamissue-web" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data '{"production_branch":"codex/production-deploy"}'
      - name: Build static frontend
        env:
          PUBLIC_APP_BASE_URL: https://api.jamissue.growgardens.app
          PUBLIC_NAVER_MAP_CLIENT_ID: gg1zgvvk0p
        run: npm run build
      - name: Publish production to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy infra/nginx/site --project-name jamissue-web --branch codex/production-deploy
