services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/owner/jamissue-backend:deploy-latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
      APP_WORKERS: ${APP_WORKERS:-2}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS}
      APP_FRONTEND_URL: ${PUBLIC_APP_BASE_URL}
      APP_SESSION_SECRET: ${APP_SESSION_SECRET}
      APP_SESSION_HTTPS: ${APP_SESSION_HTTPS:-true}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_ACCESS_TOKEN_MINUTES: ${APP_JWT_ACCESS_TOKEN_MINUTES:-20160}
      APP_ADMIN_USER_IDS: ${APP_ADMIN_USER_IDS:-}
      APP_DATABASE_URL: ${APP_DATABASE_URL}
      APP_SEED_DEMO_DATA: ${APP_SEED_DEMO_DATA:-false}
      APP_CLEANUP_LEGACY_DEMO_DATA: ${APP_CLEANUP_LEGACY_DEMO_DATA:-true}
      APP_AUTO_IMPORT_PUBLIC_DATA: ${APP_AUTO_IMPORT_PUBLIC_DATA:-true}
      APP_PUBLIC_DATA_SOURCE_URL: ${APP_PUBLIC_DATA_SOURCE_URL:-}
      APP_PUBLIC_EVENT_SOURCE_URL: ${APP_PUBLIC_EVENT_SOURCE_URL:-}
      APP_PUBLIC_EVENT_SERVICE_KEY: ${APP_PUBLIC_EVENT_SERVICE_KEY:-}
      APP_PUBLIC_EVENT_CITY_KEYWORD: ${APP_PUBLIC_EVENT_CITY_KEYWORD:-대전}
      APP_PUBLIC_EVENT_REFRESH_MINUTES: ${APP_PUBLIC_EVENT_REFRESH_MINUTES:-360}
      APP_UPLOAD_DIR: /app/storage/uploads
      APP_UPLOAD_BASE_URL: /uploads
      APP_MAX_UPLOAD_SIZE_BYTES: ${APP_MAX_UPLOAD_SIZE_BYTES:-5242880}
      APP_NAVER_LOGIN_CLIENT_ID: ${APP_NAVER_LOGIN_CLIENT_ID:-}
      APP_NAVER_LOGIN_CLIENT_SECRET: ${APP_NAVER_LOGIN_CLIENT_SECRET:-}
      APP_NAVER_LOGIN_CALLBACK_URL: ${APP_NAVER_LOGIN_CALLBACK_URL:-}
      APP_GOOGLE_LOGIN_CLIENT_ID: ${APP_GOOGLE_LOGIN_CLIENT_ID:-}
      APP_GOOGLE_LOGIN_CLIENT_SECRET: ${APP_GOOGLE_LOGIN_CLIENT_SECRET:-}
      APP_GOOGLE_LOGIN_CALLBACK_URL: ${APP_GOOGLE_LOGIN_CALLBACK_URL:-}
      APP_KAKAO_LOGIN_CLIENT_ID: ${APP_KAKAO_LOGIN_CLIENT_ID:-}
      APP_KAKAO_LOGIN_CLIENT_SECRET: ${APP_KAKAO_LOGIN_CLIENT_SECRET:-}
      APP_KAKAO_LOGIN_CALLBACK_URL: ${APP_KAKAO_LOGIN_CALLBACK_URL:-}
      APP_APPLE_LOGIN_CLIENT_ID: ${APP_APPLE_LOGIN_CLIENT_ID:-}
      APP_APPLE_LOGIN_CLIENT_SECRET: ${APP_APPLE_LOGIN_CLIENT_SECRET:-}
      APP_APPLE_LOGIN_CALLBACK_URL: ${APP_APPLE_LOGIN_CALLBACK_URL:-}
      APP_STAMP_UNLOCK_RADIUS_METERS: ${APP_STAMP_UNLOCK_RADIUS_METERS:-120}
    volumes:
      - uploads-data:/app/storage/uploads
    expose:
      - '8001'

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/owner/jamissue-frontend:deploy-latest}
    build:
      context: ..
      dockerfile: infra/docker/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      FRONTEND_PORT: 8080
      BACKEND_UPSTREAM: http://backend:8001
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL}
      PUBLIC_NAVER_MAP_CLIENT_ID: ${PUBLIC_NAVER_MAP_CLIENT_ID}
    ports:
      - '${HOST_HTTP_PORT:-8080}:8080'

volumes:
  uploads-data:
